  <!-- Bold roof chevron -->
  <polyline points="14,42 32,20 50,42" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner subtle chevron for depth -->
  <polyline points="20,42 32,28 44,42" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base bar -->
